<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#045ea9">
<title>DRC Hub</title>
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="DRC Hub">
<link rel="apple-touch-icon" href="icon.png">
<style>
/* ============================================================
   CONFIG NOTE: edit the CONFIG object near the bottom of this
   file to set your company name, support phone number, and
   the jobber guide video link.
   ============================================================ */
:root{
  --teal:#045ea9; --teal-d:#034a85; --teal-l:#2b7fd0;
  --bg:#f1f5f9; --card:#ffffff; --ink:#0f172a; --muted:#64748b;
  --line:#e2e8f0; --amber:#f59e0b; --amber-bg:#fef3c7;
  --green:#16a34a; --green-bg:#dcfce7; --red:#dc2626; --red-bg:#fee2e2;
  --blue:#2563eb; --blue-bg:#dbeafe; --radius:16px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 10px 25px rgba(0,0,0,.12);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg); color:var(--ink);
  font-size:15px; line-height:1.45;
}
/* phone frame for desktop preview */
.frame{
  max-width:430px; margin:0 auto; min-height:100vh;
  background:var(--bg); position:relative;
  box-shadow:0 0 60px rgba(0,0,0,.12);
  display:flex; flex-direction:column;
}
.topbar{
  background:var(--teal); color:#fff; padding:14px 16px;
  display:flex; align-items:center; justify-content:space-between;
  position:sticky; top:0; z-index:40;
}
.topbar h1{font-size:17px; margin:0; font-weight:700; display:flex; align-items:center; gap:8px}
.logo{width:26px;height:26px;border-radius:7px;background:#fff;color:var(--teal);
  display:grid;place-items:center;font-weight:800;font-size:13px}
.roleseg{display:flex;background:rgba(255,255,255,.18);border-radius:999px;padding:3px}
.roleseg button{
  border:0;background:transparent;color:#fff;font-size:12px;font-weight:600;
  padding:6px 11px;border-radius:999px;cursor:pointer;opacity:.8
}
.roleseg button.on{background:#fff;color:var(--teal);opacity:1}
.hdruser{display:flex;align-items:center;gap:9px;font-size:13px;font-weight:600}
.logoutbtn{border:0;background:rgba(255,255,255,.18);color:#fff;font-size:12px;font-weight:600;
  padding:7px 12px;border-radius:999px;cursor:pointer}
.loginwrap{display:flex;flex-direction:column;justify-content:center;min-height:calc(100vh - 120px);padding:8px 4px}
.loginbrand{text-align:center;margin-bottom:26px}
.loginbrand .blogo{width:64px;height:64px;border-radius:18px;background:var(--teal);color:#fff;
  display:grid;place-items:center;font-weight:800;font-size:26px;margin:0 auto 12px}
.loginbrand h2{margin:0;font-size:22px}.loginbrand p{margin:4px 0 0;color:var(--muted)}
.demohint{text-align:center;font-size:12px;color:var(--muted);margin:16px 0 8px}
.content{flex:1;padding:16px 16px 96px;overflow-y:auto}
.content svg{vertical-align:-3px;flex:none}
.btn svg,.iconbtn svg{width:17px;height:17px}
.view{display:none;animation:fade .25s ease}
.view.on{display:block}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}

h2.section{font-size:13px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);margin:22px 0 10px;font-weight:700}
h2.section:first-child{margin-top:4px}
.card{background:var(--card);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
.card h3{margin:0 0 4px;font-size:16px}
.row{display:flex;align-items:center;gap:10px}
.spread{display:flex;align-items:center;justify-content:space-between;gap:10px}
.muted{color:var(--muted);font-size:13px}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;
  padding:4px 9px;border-radius:999px;text-transform:uppercase;letter-spacing:.03em}
.pill.amber{background:var(--amber-bg);color:#92400e}
.pill.green{background:var(--green-bg);color:#166534}
.pill.red{background:var(--red-bg);color:#991b1b}
.pill.blue{background:var(--blue-bg);color:#1e40af}
.pill.gray{background:#f1f5f9;color:#475569}

.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;
  border:0;border-radius:12px;padding:13px 16px;font-size:15px;font-weight:600;
  cursor:pointer;width:100%;transition:transform .05s}
.btn:active{transform:scale(.98)}
.btn.primary{background:var(--teal);color:#fff}
.btn.green{background:var(--green);color:#fff}
.btn.red{background:#fff;color:var(--red);border:1.5px solid #fecaca}
.btn.ghost{background:#f1f5f9;color:var(--ink)}
.btn.sm{padding:10px 12px;font-size:14px;width:auto}
.btnrow{display:flex;gap:10px}

input,select,textarea{
  width:100%;border:1.5px solid var(--line);border-radius:12px;
  padding:12px;font-size:15px;font-family:inherit;background:#fff;color:var(--ink);margin-top:6px
}
textarea{resize:vertical;min-height:80px}
label{font-size:13px;font-weight:600;color:#334155;display:block;margin-top:12px}
label:first-child{margin-top:0}

/* bottom nav */
.tabbar{
  position:fixed;left:50%;transform:translateX(-50%);bottom:0;width:100%;max-width:430px;
  background:#fff;border-top:1px solid var(--line);
  display:flex;z-index:50;padding-bottom:env(safe-area-inset-bottom)
}
.tabbar button{
  flex:1;border:0;background:transparent;padding:9px 0 11px;cursor:pointer;
  display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--muted);
  font-size:10.5px;font-weight:600;position:relative
}
.tabbar button.on{color:var(--teal)}
.tabbar svg{width:23px;height:23px}
.tabbar .badge{position:absolute;top:4px;right:50%;margin-right:-22px;background:var(--red);
  color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;
  display:grid;place-items:center;padding:0 4px}

/* availability grid */
.dayrow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--line)}
.dayrow:last-child{border:0}
.dayname{font-weight:600;width:42px}
.switch{width:46px;height:27px;border-radius:999px;background:#cbd5e1;position:relative;cursor:pointer;flex:none;transition:background .2s}
.switch.on{background:var(--teal)}
.switch i{position:absolute;top:3px;left:3px;width:21px;height:21px;border-radius:50%;background:#fff;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.switch.on i{left:22px}
.timesel{display:flex;gap:6px;align-items:center}
.timesel select{width:auto;margin:0;padding:7px 8px;font-size:13px}

/* chat */
.chatwrap{display:flex;flex-direction:column;height:calc(100vh - 56px - 80px)}
.chatlog{flex:1;overflow-y:auto;padding:4px 2px 10px;display:flex;flex-direction:column;gap:10px}
.msg{max-width:80%;padding:10px 13px;border-radius:16px;font-size:14px;line-height:1.4;white-space:pre-wrap}
.msg.bot{background:#fff;border:1px solid var(--line);align-self:flex-start;border-bottom-left-radius:4px}
.msg.me{background:var(--teal);color:#fff;align-self:flex-end;border-bottom-right-radius:4px}
.msg.admin{background:#eef2ff;border:1px solid #c7d2fe;align-self:flex-start;border-bottom-left-radius:4px}
.msgmeta{font-size:10px;color:var(--muted);margin:2px 4px}
.quickreplies{display:flex;flex-wrap:wrap;gap:7px;margin:6px 0}
.quickreplies button{background:#fff;border:1.5px solid var(--teal);color:var(--teal);
  border-radius:999px;padding:7px 12px;font-size:12.5px;font-weight:600;cursor:pointer}
.chatinput{display:flex;gap:8px;align-items:center;padding-top:8px;border-top:1px solid var(--line)}
.chatinput input{margin:0}
.iconbtn{flex:none;width:44px;height:44px;border-radius:50%;border:0;background:var(--teal);color:#fff;cursor:pointer;display:grid;place-items:center}

/* accordion */
.acc{background:#fff;border-radius:12px;box-shadow:var(--shadow);margin-bottom:8px;overflow:hidden}
.acc summary{padding:14px 16px;font-weight:600;cursor:pointer;list-style:none;display:flex;justify-content:space-between;align-items:center}
.acc summary::-webkit-details-marker{display:none}
.acc[open] summary{color:var(--teal)}
.acc .accbody{padding:0 16px 14px;color:#334155;font-size:14px}

.videoph{background:linear-gradient(135deg,#045ea9,#2b7fd0);border-radius:14px;height:180px;
  display:grid;place-items:center;color:#fff;cursor:pointer;position:relative;overflow:hidden;margin-bottom:8px}
.playbtn{width:62px;height:62px;border-radius:50%;background:rgba(255,255,255,.25);display:grid;place-items:center;backdrop-filter:blur(2px)}
.playbtn::after{content:"";border-left:20px solid #fff;border-top:13px solid transparent;border-bottom:13px solid transparent;margin-left:5px}

.empty{text-align:center;color:var(--muted);padding:40px 20px;font-size:14px}
.toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%);background:var(--ink);color:#fff;
  padding:12px 20px;border-radius:999px;font-size:14px;font-weight:600;z-index:90;opacity:0;
  transition:opacity .2s,transform .2s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-6px)}

/* admin */
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:6px}
.stat{background:#fff;border-radius:14px;padding:14px;box-shadow:var(--shadow)}
.stat .n{font-size:26px;font-weight:800;color:var(--teal)}
.stat .l{font-size:12px;color:var(--muted);font-weight:600}
.avatar{width:38px;height:38px;border-radius:50%;background:var(--teal);color:#fff;display:grid;place-items:center;font-weight:700;flex:none}
.avatar.b{background:#7c3aed}.avatar.c{background:#db2777}.avatar.d{background:#ea580c}.avatar.e{background:#0891b2}
.zonechips{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}
.chip{background:#f1f5f9;color:#475569;font-size:11px;font-weight:600;padding:3px 8px;border-radius:6px}
.availbar{display:flex;gap:3px;margin-top:8px}
.availbar span{flex:1;text-align:center;font-size:9px;font-weight:700;padding:5px 0;border-radius:5px;background:#f1f5f9;color:#94a3b8}
.availbar span.a{background:var(--green-bg);color:#166534}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:80;display:none;align-items:flex-end}
.modal.on{display:flex}
.sheet{background:#fff;width:100%;max-width:430px;margin:0 auto;border-radius:20px 20px 0 0;padding:20px 18px 28px;max-height:88vh;overflow-y:auto;animation:up .25s ease}
@keyframes up{from{transform:translateY(100%)}to{transform:none}}
.sheet h3{margin:0 0 14px;font-size:18px}
.closex{position:absolute;right:16px;top:14px;border:0;background:#f1f5f9;width:32px;height:32px;border-radius:50%;font-size:18px;cursor:pointer;color:var(--muted)}
.checkrow{display:flex;align-items:center;gap:10px;padding:11px;border:1.5px solid var(--line);border-radius:12px;margin-bottom:8px;cursor:pointer}
.checkrow.sel{border-color:var(--teal);background:#eaf2fb}
.checkrow .cb{width:22px;height:22px;border-radius:6px;border:2px solid #cbd5e1;flex:none;display:grid;place-items:center}
.checkrow.sel .cb{background:var(--teal);border-color:var(--teal);color:#fff}
.divider{height:1px;background:var(--line);margin:16px 0}
.notice{background:#eaf2fb;border:1px solid #b6d4f0;border-radius:12px;padding:12px;font-size:13px;color:#045ea9;margin-bottom:12px}
</style>
</head>
<body>
<div class="frame">
  <div class="topbar">
    <h1><span class="logo" id="logoTxt">DRC</span> <span id="brandTxt">Contractor Hub</span></h1>
    <div id="headerRight"></div>
  </div>

  <div class="content" id="content"><!-- views injected --></div>

  <!-- contractor tab bar -->
  <nav class="tabbar" id="tabbar"></nav>
</div>

<div class="toast" id="toast"></div>
<div class="modal" id="modal"><div class="sheet" id="sheet"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
/* ============================================================
   ⚙️  CONFIG — edit these three values
   ============================================================ */
const CONFIG = {
  COMPANY: "DRC",                       // shows in logo + title
  BRAND: "Contractor Hub",              // subtitle in header
  SUPPORT_PHONE: "613-324-6779",        // management line for SMS button
  OFFICE_EMAIL: "contact@donerightcleaning.ca", // invoices are emailed here on submit
  REVIEW_URL: "https://g.page/r/CS4XjoAlEYTgEBM/review", // Google review link (QR on Review tab)
  PREMIUM_RATE: 27,                     // $/hr paid for premium (short-notice) hours
  GUIDE_VIDEO_FILE: "jobber-guide.mp4", // a video file kept next to this HTML (plays in-app)
  GUIDE_VIDEO_URL: "",                  // OR paste a YouTube/Vimeo link instead

  // ===== SUPABASE (your live database + logins) =====
  // 1) URL is already filled in for your project.
  // 2) Paste your "anon public" key from Supabase → Project Settings → API.
  //    When both are filled in, the app uses real logins + shared data.
  //    If you leave the key blank, the app runs in offline demo mode.
  SUPABASE_URL:      "https://bjcwudhhgwjbvnkwcnfr.supabase.co",
  SUPABASE_ANON_KEY: "sb_publishable_dx0JsbuuiWZRCWt2QeYaNQ_xBNcJrfY"
};

/* ---------- Supabase client (online when configured) ---------- */
const ONLINE = !!(window.supabase && CONFIG.SUPABASE_URL && CONFIG.SUPABASE_ANON_KEY
                  && !CONFIG.SUPABASE_ANON_KEY.startsWith('PASTE_'));
// "Keep me logged in": localStorage persists across browser restarts; sessionStorage clears on close.
function makeClient(keep){
  return window.supabase.createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_ANON_KEY, {
    auth:{ persistSession:true, autoRefreshToken:true,
           storage: keep ? window.localStorage : window.sessionStorage }
  });
}
let keepPref = true; try{ keepPref = localStorage.getItem('drcKeep') !== 'false'; }catch(e){}
let sb = ONLINE ? makeClient(keepPref) : null;
const CLS = ['','b','c','d','e'];
function initialsOf(name){ return (name||'?').split(/\s+/).map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
const BOT_GREETING = "Hi 👋 I'm the DRC assistant. Ask me anything — pay, scheduling, extra assignments, or how to submit your weekly invoice. If I can't help, you can reach a real person.";

/* ---------- storage helpers (persist on this device) ---------- */
const DB = {
  load(){
    try{ const r = localStorage.getItem('drcHub_v5'); if(r) return JSON.parse(r); }catch(e){}
    return null;
  },
  save(){ try{ localStorage.setItem('drcHub_v5', JSON.stringify(state)); }catch(e){} }
};
/* ---------- session / login (demo) ---------- */
function loadSession(){ try{ const r=localStorage.getItem('drcSession'); if(r) return JSON.parse(r); }catch(e){} return null; }
function saveSession(){ try{ session?localStorage.setItem('drcSession',JSON.stringify(session)):localStorage.removeItem('drcSession'); }catch(e){} }

/* ============================================================
   SUPABASE DATA LAYER  (used when ONLINE)
   Loads everything the signed-in user is allowed to see into the
   same `state` shape the screens already use, then mutations below
   write changes back to the database.
   ============================================================ */
async function sbLoadAll(){
  const { data:{ user } } = await sb.auth.getUser();
  if(!user) return false;
  const { data:prof, error } = await sb.from('profiles').select('*').eq('id', user.id).single();
  if(error || !prof){ toast('Could not load your profile'); return false; }
  if(prof.status==='Removed'){ await sb.auth.signOut(); session=null;
    toast('Your account has been deactivated — please contact the office.'); return false; }
  const isAdmin = prof.role === 'admin';
  session = { role:prof.role, name:prof.full_name||user.email, id:user.id };
  const _nm=(prof.full_name||'').trim();
  session.needsName = !_nm || _nm.includes('@');   // treat an email-as-name as "no name yet"
  state.me = { id:user.id, name:prof.full_name||user.email, initials:initialsOf(prof.full_name||user.email) };

  // admins load everyone, then split into contractors (scheduling board) + full team (role mgmt)
  let allProfs = isAdmin ? ((await sb.from('profiles').select('*').order('full_name')).data || []) : [prof];
  let profs = isAdmin ? allProfs.filter(p=>p.role==='contractor' && p.status!=='Removed') : [prof];
  state.contractors = profs.map((p,i)=>({
    id:p.id, name:p.full_name||'Contractor', initials:initialsOf(p.full_name||'Contractor'),
    cls:CLS[i%CLS.length], zones:p.zones||[], status:p.status||'Active', avail:{}, template:{},
    locked:!!p.avail_locked, lockedTemplate:p.avail_template||null, hourly_rate:p.hourly_rate,
    score:(p.score==null?6:p.score)
  }));
  state.team = isAdmin ? allProfs.map((p,i)=>({
    id:p.id, name:p.full_name||'(no name)', role:p.role, status:p.status||'Active',
    initials:initialsOf(p.full_name||'?'), cls:CLS[i%CLS.length], rate:p.hourly_rate,
    score:(p.score==null?6:p.score)
  })) : null;

  const wks = weekStarts();
  const av = (await sb.from('availability').select('*').in('week_start', wks)).data || [];
  av.forEach(r=>{ const c=state.contractors.find(x=>x.id===r.contractor_id); if(c) c.avail[r.week_start]=r.data||{}; });

  const asg = (await sb.from('assignments').select('*').order('created_at',{ascending:false})).data || [];
  state.premiumOffers = asg.map(a=>({id:a.id,to:a.contractor_id,client:a.client,date:a.job_date,
    pay:a.pay||'$27/hr',reasons:a.reasons||[],addr:a.address,status:a.status}));

  const inv = (await sb.from('invoices').select('*').order('submitted_at',{ascending:false})).data || [];
  state.invoices = inv.map(i=>({id:i.id,contractorId:i.contractor_id,contractor:i.contractor_name,
    start:i.week_start,end:i.week_end,hours:Number(i.hours)||0,premiumHours:Number(i.premium_hours)||0,
    notes:i.notes||'',paid:!!i.paid,status:i.paid?'Paid':'Submitted'}));

  const inc = (await sb.from('incidents').select('*').order('created_at',{ascending:false})).data || [];
  state.incidents = inc.map(r=>({id:r.id,type:r.type,where:r.where_text,date:r.occurred_on,desc:r.description}));

  const msgs = (await sb.from('messages').select('*').order('created_at')).data || [];
  if(isAdmin){
    const byC = {};
    msgs.forEach(m=>{ (byC[m.contractor_id]=byC[m.contractor_id]||[]).push(m); });
    state.adminChats = Object.keys(byC).map(cid=>{
      const c = state.contractors.find(x=>x.id===cid) || {name:'Contractor',initials:'?',cls:''};
      const log = byC[cid].map(m=>({from:m.sender==='contractor'?'me':m.sender,text:m.body,t:new Date(m.created_at).getTime()}));
      const last = byC[cid][byC[cid].length-1];
      return {id:cid, contractor:c.name, initials:c.initials, cls:c.cls,
        last:last?last.body:'', unread:!!(last && last.sender==='contractor'), log};
    });
  } else {
    state.chat = msgs.map(m=>({from:m.sender==='contractor'?'me':m.sender,text:m.body,t:new Date(m.created_at).getTime()}));
    if(state.chat.length===0) state.chat=[{from:'bot',text:BOT_GREETING,t:Date.now()}];
  }

  if(isAdmin){
    const ns = (await sb.from('notifications').select('*').order('created_at',{ascending:false})).data || [];
    state.notifications = ns.map(n=>({id:n.id,type:n.type,contractor:n.contractor_name,
      summary:n.summary,details:n.details||[],read:!!n.read,t:new Date(n.created_at).getTime()}));
  } else { state.notifications = null; }
  return true;
}
// fire-and-forget write with an error toast on failure
function sbDo(p){ Promise.resolve(p).then(r=>{ if(r&&r.error){ console.error(r.error); toast('Save failed — check connection'); } })
  .catch(e=>{ console.error(e); toast('Save failed'); }); }
async function sbRefresh(){ if(ONLINE){ await sbLoadAll(); render(); } }

/* ---------- seed data ---------- */
function seed(){
  return {
    me: { id:'c1', name:'Maria Lopez', initials:'ML' },
    contractors:[
      {id:'c1',name:'Maria Lopez',initials:'ML',cls:'',zones:['Westboro','Hintonburg','Kanata'],
        template:{Mon:{from:'09:00',to:'17:00'},Tue:{from:'09:00',to:'17:00'},Wed:0,Thu:{from:'09:00',to:'17:00'},Fri:{from:'09:00',to:'17:00'},Sat:{from:'09:00',to:'14:00'},Sun:0}, avail:{}, status:'Active'},
      {id:'c2',name:'James Okafor',initials:'JO',cls:'b',zones:['Orleans','Vanier','Beacon Hill'],
        template:{Mon:{from:'09:00',to:'15:00'},Tue:0,Wed:{from:'09:00',to:'15:00'},Thu:{from:'09:00',to:'15:00'},Fri:{from:'09:00',to:'15:00'},Sat:0,Sun:0}, avail:{}, status:'Active'},
      {id:'c3',name:'Priya Sharma',initials:'PS',cls:'c',zones:['Anywhere in Ottawa'],

/* ---------- week helpers (availability for the next month) ---------- */
function isoDate(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function mondayOf(d){ const x=new Date(d); const off=(x.getDay()+6)%7; x.setDate(x.getDate()-off); x.setHours(0,0,0,0); return x; }
function weekStarts(){ const m=mondayOf(new Date()); const out=[]; for(let i=0;i<4;i++){ const w=new Date(m); w.setDate(m.getDate()+i*7); out.push(isoDate(w)); } return out; }
function weekLabel(iso){ const s=new Date(iso+'T00:00:00'); const e=new Date(s); e.setDate(s.getDate()+6);
  const f=d=>d.toLocaleDateString('en-US',{month:'short',day:'numeric'}); return f(s)+' – '+f(e); }
function clone(o){ return JSON.parse(JSON.stringify(o)); }
function ensureWeeks(c){ if(!c.avail)c.avail={};
  weekStarts().forEach(ws=>{
    if(c.locked && c.lockedTemplate) c.avail[ws]=clone(c.lockedTemplate);   // repeats weekly
    else if(!c.avail[ws]) c.avail[ws]=clone(c.template||{});
  });
}
function ensureAllWeeks(){ (state.contractors||[]).forEach(ensureWeeks); }

async function tryLogin(){

  if(!e||!p){ toast('Enter your email and password'); return; }
  if(ONLINE){
    const keep = document.getElementById('keepLogged') ? document.getElementById('keepLogged').checked : true;
    try{ localStorage.setItem('drcKeep', keep?'true':'false'); }catch(_){}

    toast('Signing in…');

  if(!ONLINE){ toast('Sign-up needs the live database'); return; }
  toast('Creating your account…');
  const { data, error } = await sb.auth.signUp({ email, password:pass,
    options:{ data:{ full_name:(first+' '+last).trim() } } });

function botReply(q){
  q=q.toLowerCase();
  if(q.includes('paid')||q.includes('pay')&&q.includes('get')||q.includes('invoice'))
    return "Submit one invoice each week (Sunday) in the Invoices tab with your total hours worked. Payments are issued biweekly by direct deposit, and Jobber is the source of truth for hours. Want me to open the invoice form?";
  if(q.includes('premium')||q.includes('extra')||q.includes('27'))
    return "Extra assignments — short-notice jobs, holidays, or work outside your usual zone — pay $27/hr. They show up in the Jobs tab and you can accept or decline each one. Your regular schedule is handled by the office within your set availability.";
  if(q.includes('availab')||q.includes('schedule')||q.includes('zone'))
    return "Tap the Availability button on your Home screen to set which days and times you can work, and which Ottawa zones you cover (including 'Anywhere in Ottawa'). The office schedules you within that — keep it current!";
  if(q.includes('decline')||q.includes('cancel'))
    return "For any extra assignment in the Jobs tab, just hit Decline (or Accept). The office is notified automatically.";
  if(q.includes('report')||q.includes('incident')||q.includes('problem')||q.includes('broke')||q.includes('damage'))
    return "Sorry to hear that. Please file an Incident Report from the Guide tab (or Home → Report). For anything urgent or about insurance/liability, tap 'Text a human' below and the office will follow up.";
  if(q.includes('supplies')||q.includes('equipment'))
    return "Standard supplies are provided per job. If you're short, message the office. For a missing-supplies emergency, text a human below.";
  if(q.includes('hi')||q.includes('hello')||q.includes('hey'))
    return "Hi! 👋 I can help with pay, scheduling, premium jobs, invoices and incident reports. What do you need?";
  return "I'm not 100% sure on that one. For anything I can't answer — pay disputes, insurance, urgent issues — tap 'Text a human' below and someone from the DRC office will reply by SMS.";
}

function fmt12(v){
  let [h,m]=v.split(':').map(Number);
  const ap=h>=12?'PM':'AM';
  let hh=h%12; if(hh===0)hh=12;
  return hh+':'+String(m).padStart(2,'0')+' '+ap;
}
function timeOpts(sel){
  let o='';
  for(let h=9;h<=19;h++){ for(const m of ['00','30']){
    if(h===19&&m==='30') continue;            // cap at 7:00 PM
    const v=String(h).padStart(2,'0')+':'+m;
    o+=`<option value="${v}" ${v===sel?'selected':''}>${fmt12(v)}</option>`;
  }}
  return o;
}
function copyPrevWeek(){

  const locked=!!me.locked;
  const wk = locked ? (me.lockedTemplate||{}) : (me.avail[wks[availWeek]]||{});
  const daysBlock = locked ? `

        <div class="switch ${a?'on':''}" id="sw_${d}" onclick="toggleDay('${d}')"><i></i></div></div>`;}).join('')}</div>

function lockAvailability(){
  const me=state.contractors.find(x=>x.id===state.me.id);
  const tpl=clone(me.avail[weekStarts()[availWeek]]||{});
  me.locked=true; me.lockedTemplate=tpl;
  weekStarts().forEach(ws=>me.avail[ws]=clone(tpl));
  if(ONLINE){
    sbDo(sb.from('profiles').update({avail_locked:true, avail_template:tpl}).eq('id',state.me.id));
    weekStarts().forEach(ws=> sbDo(sb.from('availability').upsert(
      {contractor_id:state.me.id,week_start:ws,data:tpl,updated_at:new Date().toISOString()},
      {onConflict:'contractor_id,week_start'})));
  }
  toast('Schedule locked — repeats weekly 🔒'); openAvail();
}
function unlockAvailability(){
  const me=state.contractors.find(x=>x.id===state.me.id);
  me.locked=false;
  if(ONLINE) sbDo(sb.from('profiles').update({avail_locked:false}).eq('id',state.me.id));
  toast('Unlocked — adjust your availability'); openAvail();
}
function setAvailWeek(i){ availWeek=i; openAvail(); }
function curWeekAvail(){ const me=state.contractors.find(x=>x.id===state.me.id); return me.avail[weekStarts()[availWeek]]; }
function toggleDay(d){ const wk=curWeekAvail();
  wk[d]=wk[d]?0:{from:'09:00',to:'17:00'}; openAvail(); }
function setTime(d,which,v){ const wk=curWeekAvail();
  if(wk[d]) wk[d][which]=v; }
function toggleZone(z){ const me=state.contractors.find(x=>x.id===state.me.id);
  if(z==='Anywhere in Ottawa'){
    me.zones = me.zones.includes(z) ? [] : ['Anywhere in Ottawa'];
  } else {
    if(me.zones.includes('Anywhere in Ottawa')) return;
    const i=me.zones.indexOf(z);
    if(i>=0)me.zones.splice(i,1); else me.zones.push(z);
  }
  openAvail();
}
function saveAvail(){
  if(ONLINE){
    const me=state.contractors.find(x=>x.id===state.me.id);
    weekStarts().forEach(ws=>{
      sbDo(sb.from('availability').upsert(
        {contractor_id:state.me.id, week_start:ws, data:(me.avail[ws]||{}), updated_at:new Date().toISOString()},
        {onConflict:'contractor_id,week_start'}));
    });
    sbDo(sb.from('profiles').update({zones:me.zones}).eq('id',state.me.id));
    const changes = [...availDiff(availSnapshot, me.avail), ...zonesDiff(availSnapshotZones, me.zones)];
    if(changes.length){
      sbDo(sb.from('notifications').insert({contractor_id:state.me.id, contractor_name:me.name,
        type:'availability', summary:`${me.name} updated their availability (${changes.length} change${changes.length>1?'s':''})`,
        details:changes}));
    }
  }
  closeSheet(); toast('Availability updated ✓'); render();
}
function availDiff(before, after){
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const fmt=x=>x?`${fmt12(x.from)}–${fmt12(x.to)}`:'';
  const out=[];
  weekStarts().forEach(ws=>{
    const b=(before&&before[ws])||{}, a=(after&&after[ws])||{};
    days.forEach(d=>{
      const bd=b[d], ad=a[d];
      if(!bd && ad) out.push(`${weekLabel(ws)} · ${d}: now available ${fmt(ad)}`);
      else if(bd && !ad) out.push(`${weekLabel(ws)} · ${d}: now unavailable`);
      else if(bd && ad && (bd.from!==ad.from || bd.to!==ad.to)) out.push(`${weekLabel(ws)} · ${d}: ${fmt(bd)} → ${fmt(ad)}`);
    });
  });
  return out;
}
function zonesDiff(before, after){
  const b=before||[], a=after||[], out=[];
  const added=a.filter(z=>!b.includes(z)), removed=b.filter(z=>!a.includes(z));
  if(added.length) out.push('Added zones: '+added.join(', '));
  if(removed.length) out.push('Removed zones: '+removed.join(', '));
  return out;
}

          <div class="muted" style="white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:210px">${ch.last}</div></div></div>
      ${ch.unread?`<span class="pill red">New</span>`:`<span class="pill gray">Open</span>`}
    </div>`).join(''):`<div class="card muted">No conversations yet.</div>`}</div>

  <div class="spread"><h2 class="section">Extra assignments</h2></div>
  <button class="btn primary" onclick="openOfferJob()">${svg('<path d="M12 5v14M5 12h14"/>')} Offer an extra assignment</button>
  ${state.premiumOffers.length?`<div style="margin-top:12px">${state.premiumOffers.map(o=>{
    const c=state.contractors.find(x=>x.id===o.to);
    return `<div class="card"><div class="spread"><h3 style="font-size:15px">${o.client}</h3>
      <span class="pill ${o.status==='pending'?'amber':(o.status==='accepted'?'green':'gray')}">${o.status}</span></div>
      <div class="muted">${o.date} · ${o.pay} → offered to ${c?c.name:'?'}</div></div>`;}).join('')}</div>`:''}

  <h2 class="section">Scheduling board — availability & zones</h2>
  <p class="muted" style="margin-top:-4px">Everyone's availability for the selected week.</p>
  <div class="zonechips" style="margin-bottom:10px">${weekStarts().map((ws,i)=>`
    <span class="chip" style="cursor:pointer;padding:7px 11px;${i===adminWeek?'background:var(--teal);color:#fff':''}"
      onclick="setAdminWeek(${i})">${i===0?'This week · ':(i===1?'Next week · ':'')}${weekLabel(ws)}</span>`).join('')}</div>
  ${state.contractors.map(adminContractorCard).join('')}
  `;
}
function setInvFilter(f){ invFilter=f; render(); }
function adminInvoicesView(){
  const all=state.invoices.slice().reverse();
  const list = invFilter==='all'?all : all.filter(i=> invFilter==='paid'? i.paid : !i.paid);
  const unpaidTotal=state.invoices.filter(i=>!i.paid).reduce((s,i)=>s+Number(i.hours||0)+Number(i.premiumHours||0),0);
  return `
  <h2 class="section">Weekly invoices</h2>
  <div class="notice">Tap <strong>Mark paid</strong> once you've sent a contractor's direct deposit. ${unpaidTotal?`<strong>${unpaidTotal} hrs</strong> awaiting payment.`:'All caught up 🎉'}</div>
  <div class="zonechips" style="margin-bottom:12px">
    ${[['unpaid','Unpaid'],['paid','Paid'],['all','All']].map(([f,l])=>`
      <span class="chip" style="cursor:pointer;padding:7px 12px;${invFilter===f?'background:var(--teal);color:#fff':''}"
        onclick="setInvFilter('${f}')">${l}</span>`).join('')}
  </div>
  ${list.length?list.map(adminInvoiceCard).join('')
    :`<div class="card muted">No ${invFilter==='all'?'':invFilter+' '}invoices.</div>`}
  <h2 class="section">Pay sheet</h2>
  <div class="btnrow">
    <button class="btn ghost" onclick="downloadPaySheet()">${svg('<path d="M12 3v12M7 10l5 5 5-5M5 21h14"/>')} Download CSV</button>
    <button class="btn ghost" onclick="emailPaySheet()">${svg('<path d="M4 4h16v16H4z"/><path d="M4 6l8 6 8-6"/>')} Email to office</button>
  </div>
  `;
}
function paySheetRows(){
  const rows=[['Contractor','Week start','Week end','Regular hrs','Premium hrs','Rate','Total due','Status']];
  (state.invoices||[]).forEach(inv=>{ const t=invoiceTotal(inv);
    rows.push([inv.contractor||'', inv.start||'', inv.end||'', inv.hours||0, inv.premiumHours||0,
      t?t.rate.toFixed(2):'', t?t.total.toFixed(2):'', inv.paid?'Paid':'Unpaid']); });
  return rows;
}
function downloadPaySheet(){
  const csv=paySheetRows().map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  try{
    const blob=new Blob([csv],{type:'text/csv'});
    const url=URL.createObjectURL(blob);
    const a=document.createElement('a'); a.href=url; a.download='DRC-pay-sheet.csv'; a.click();
    setTimeout(()=>URL.revokeObjectURL(url),1000);
    toast('Pay sheet downloaded — attach it to your email');
  }catch(e){ toast('Could not generate file'); }
}
function emailPaySheet(){
  let body='DRC weekly pay sheet\n\n';
  (state.invoices||[]).forEach(inv=>{ const t=invoiceTotal(inv);
    body+=`${inv.contractor}: ${inv.hours||0}h regular`+(inv.premiumHours?` + ${inv.premiumHours}h premium`:'')
       +(t?` = $${t.total.toFixed(2)}`:' (rate not set)')+(inv.paid?' [paid]':'')+'\n'; });
  window.location.href=`mailto:${CONFIG.OFFICE_EMAIL}?subject=${encodeURIComponent('DRC weekly pay sheet')}&body=${encodeURIComponent(body)}`;
}
function setAdminWeek(i){ adminWeek=i; render(); }
function adminTeamView(){
  const all = state.team || (state.contractors||[]).map(c=>({id:c.id,name:c.name,role:c.role||'contractor',status:c.status||'Active',initials:c.initials,cls:c.cls,rate:c.hourly_rate}));
  const active = all.filter(m=>m.status!=='Removed');
  const removed = all.filter(m=>m.status==='Removed');
  const card = (m,i)=>{
    const self = session && m.id===session.id;
    return `<div class="card">
      <div class="spread">
        <div class="row"><div class="avatar ${m.cls||CLS[i%CLS.length]}">${m.initials}</div>
          <div><h3 style="font-size:15px;margin:0">${m.name}</h3>
            <span class="pill ${m.role==='admin'?'blue':'gray'}">${m.role==='admin'?'Admin':'Contractor'}</span></div></div>
        ${self?`<span class="muted" style="font-size:12px">You</span>`:''}
      </div>
      ${m.role==='contractor'?`<div class="spread" style="margin-top:11px">
        <span class="muted" style="font-size:13px">Hourly pay</span>
        <div class="row" style="gap:6px"><span class="muted">$</span>
          <input id="rate_${m.id}" type="number" inputmode="decimal" step="0.25" value="${m.rate??''}" placeholder="0.00" style="width:78px;margin:0;padding:8px">
          <span class="muted">/hr</span>
          <button class="btn ghost sm" onclick="setRate('${m.id}')">Save</button></div>
      </div>
      <div class="spread" style="margin-top:9px">
        <span class="muted" style="font-size:13px">Score <span class="pill ${scoreCls(m.score)}">${m.score??6}/10</span></span>
        <div class="row" style="gap:6px">
          <input id="score_${m.id}" type="number" min="1" max="10" step="1" value="${m.score??6}" style="width:64px;margin:0;padding:8px">
          <button class="btn ghost sm" onclick="setScore('${m.id}')">Save</button></div>
      </div>`:''}
      ${self?'':`<div class="btnrow" style="margin-top:11px">
        <button class="btn ${m.role==='admin'?'ghost':'primary'}" onclick="toggleAdminRole('${m.id}')">${m.role==='admin'?'Make contractor':'Make admin'}</button>
        <button class="btn red" onclick="removeUser('${m.id}')">Remove</button>
      </div>`}
    </div>`;
  };
  return `
  <h2 class="section">Team & roles</h2>
  <div class="notice">Promote a contractor to admin, switch them back, or remove their access. Removing is reversible — past invoices stay on record.</div>
  ${active.length?active.map(card).join(''):`<div class="card muted">No active team members.</div>`}
  ${removed.length?`<h2 class="section">Removed</h2>${removed.map((m,i)=>`
    <div class="card spread">
      <div class="row"><div class="avatar gray">${m.initials}</div>
        <div><h3 style="font-size:15px;margin:0">${m.name}</h3><span class="muted" style="font-size:12px">No access</span></div></div>
      <button class="btn ghost sm" onclick="restoreUser('${m.id}')">Restore</button>
    </div>`).join('')}`:''}
  `;
}
async function toggleAdminRole(id){
  const list = state.team || state.contractors || [];
  const m = list.find(x=>x.id===id); if(!m) return;
  if(session && id===session.id){ toast("You can't change your own role"); return; }
  const newRole = m.role==='admin'?'contractor':'admin';
  if(ONLINE){
    const { error } = await sb.from('profiles').update({role:newRole}).eq('id',id);
    if(error){ toast('Update failed: '+error.message); return; }
    toast(newRole==='admin'?'Promoted to admin ✓':'Changed to contractor ✓');
    await sbRefresh();
  } else {
    m.role=newRole; toast('Role updated (demo)'); render();
  }
}
async function removeUser(id){
  const list = state.team || state.contractors || [];
  const m = list.find(x=>x.id===id); if(!m) return;
  if(session && id===session.id){ toast("You can't remove yourself"); return; }
  if(typeof confirm==='function' && !confirm('Remove '+m.name+"? They'll lose access to the app right away. You can restore them later.")) return;
  if(ONLINE){
    const { error } = await sb.from('profiles').update({status:'Removed'}).eq('id',id);
    if(error){ toast('Remove failed: '+error.message); return; }
    toast('User removed'); await sbRefresh();
  } else { m.status='Removed'; toast('User removed (demo)'); render(); }
}
async function restoreUser(id){
  const list = state.team || state.contractors || [];
  const m = list.find(x=>x.id===id); if(!m) return;
  if(ONLINE){
    const { error } = await sb.from('profiles').update({status:'Active'}).eq('id',id);
    if(error){ toast('Restore failed: '+error.message); return; }
    toast('User restored ✓'); await sbRefresh();
  } else { m.status='Active'; toast('User restored (demo)'); render(); }
}
function scoreCls(s){ s=Number(s); return s>=8?'green':(s>=6?'amber':'red'); }
async function setScore(id){
  let v=parseInt(val('score_'+id),10);
  if(isNaN(v)){ toast('Enter a score from 1 to 10'); return; }
  v=Math.max(1,Math.min(10,v));
  const m=(state.team||[]).find(x=>x.id===id); if(m)m.score=v;
  const c=(state.contractors||[]).find(x=>x.id===id); if(c)c.score=v;
  if(ONLINE){ const { error } = await sb.from('profiles').update({score:v}).eq('id',id);
    if(error){ toast('Save failed: '+error.message); return; } }
  toast('Score saved ✓'); render();
}
async function setRate(id){
  const v=parseFloat(val('rate_'+id));
  if(isNaN(v)||v<0){ toast('Enter a valid hourly rate'); return; }
  const m=(state.team||[]).find(x=>x.id===id); if(m)m.rate=v;
  const c=(state.contractors||[]).find(x=>x.id===id); if(c)c.hourly_rate=v;
  if(ONLINE){ const { error } = await sb.from('profiles').update({hourly_rate:v}).eq('id',id);
    if(error){ toast('Save failed: '+error.message); return; } }
  toast('Hourly pay saved ✓'); render();
}
function rateOf(id){
  const m=(state.team||[]).find(x=>x.id===id); if(m && m.rate!=null) return Number(m.rate);
  const c=(state.contractors||[]).find(x=>x.id===id); if(c && c.hourly_rate!=null) return Number(c.hourly_rate);
  return null;
}
function invoiceTotal(inv){
  const rate=rateOf(inv.contractorId);
  if(rate==null || isNaN(rate)) return null;
  const reg=Number(inv.hours||0)*rate;
  const prem=Number(inv.premiumHours||0)*Number(CONFIG.PREMIUM_RATE||0);
  return { rate, reg, prem, total:reg+prem };
}
function timeAgo(t){
  const s=Math.floor((Date.now()-t)/1000);
  if(s<60) return 'just now';
  const m=Math.floor(s/60); if(m<60) return m+' min ago';
  const h=Math.floor(m/60); if(h<24) return h+' hr ago';
  const d=Math.floor(h/24); return d+' day'+(d>1?'s':'')+' ago';
}
function adminNotificationsView(){
  const ns = state.notifications||[];
  if(ns.some(n=>!n.read)) setTimeout(markNotificationsRead, 60);
  return `
  <h2 class="section">Notifications</h2>
  <div class="notice">When a contractor updates their availability or submits an invoice it shows here. Tap one to see the details.</div>
  ${ns.length?ns.map(n=>`
    <details class="acc">
      <summary>
        <span>${n.type==='invoice'?'🧾':'📅'} ${n.summary}${n.read?'':' <span class="pill red" style="margin-left:4px">New</span>'}</span>
        ${svg('<path d="M6 9l6 6 6-6"/>')}
      </summary>
      <div class="accbody">
        <div class="muted" style="margin-bottom:6px">${timeAgo(n.t)}</div>
        ${(n.details||[]).map(d=>`<div style="padding:3px 0">• ${d}</div>`).join('')||'<div class="muted">No further details.</div>'}
      </div>
    </details>`).join(''):`<div class="card muted">No notifications yet.</div>`}
  `;
}
async function markNotificationsRead(){
  const unread=(state.notifications||[]).filter(n=>!n.read);
  if(!unread.length) return;
  unread.forEach(n=>n.read=true);
  if(ONLINE){ try{ await sb.from('notifications').update({read:true}).eq('read',false); }catch(e){} }
  render();
}
function adminInvoiceCard(inv){
  const c=state.contractors.find(x=>x.id===inv.contractorId);
  const range=inv.start&&inv.end?`${inv.start} → ${inv.end}`:'';
  const prem=inv.premiumHours?` · <span style="color:var(--amber)">${inv.premiumHours} premium</span>`:'';
  return `<div class="card">
    <div class="spread"><h3 style="font-size:15px;margin:0">${inv.contractor||(c?c.name:'Contractor')}</h3>
      <span class="pill ${inv.paid?'green':'amber'}">${inv.paid?'✓ Paid':'Unpaid'}</span></div>
    <div class="muted" style="margin-top:3px">Week ${range}</div>
    <div class="row" style="margin-top:5px;gap:8px"><span class="pill blue">${(Number(inv.hours||0)+Number(inv.premiumHours||0))} hrs total</span>
      <span class="muted">${inv.hours||0} regular${prem}</span></div>
    ${(()=>{ const t=invoiceTotal(inv);
      return t? `<div style="margin-top:8px;font-size:16px;font-weight:700;color:#0f172a">Total due: $${t.total.toFixed(2)}</div>
        <div class="muted" style="font-size:12px">${inv.hours||0} hrs × $${t.rate.toFixed(2)}${inv.premiumHours?` + ${inv.premiumHours} premium × $${Number(CONFIG.PREMIUM_RATE).toFixed(2)}`:''}</div>`
        : `<div class="muted" style="margin-top:8px;font-size:12px">Set this contractor's hourly pay on the Team tab to see total due.</div>`; })()}
    <div style="margin-top:10px;background:#f8fafc;border:1px solid var(--line);border-radius:10px;padding:9px 11px;font-size:13px">
      <span style="font-weight:600">📝 Notes:</span> ${inv.notes?inv.notes:'<span class="muted">No notes left</span>'}
    </div>
    <button class="btn ${inv.paid?'ghost':'green'} sm" style="width:100%;margin-top:12px" onclick="togglePaid('${inv.id}')">
      ${inv.paid?'Mark unpaid':'Mark paid'}</button>
  </div>`;
}
function togglePaid(id){ const inv=state.invoices.find(x=>x.id===id); if(!inv)return;
  inv.paid=!inv.paid; inv.status=inv.paid?'Paid':'Submitted';
  if(ONLINE) sbDo(sb.from('invoices').update({paid:inv.paid}).eq('id',id));
  toast(inv.paid?'Marked paid ✓':'Marked unpaid'); render();
}
function adminContractorCard(c){
  const days=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  const wk=(c.avail&&c.avail[weekStarts()[adminWeek]])||{};
  const times=days.filter(d=>wk[d]).map(d=>`${d} ${fmt12(wk[d].from)}–${fmt12(wk[d].to)}`).join(' · ')||'No days set this week';
  return `<div class="card">
    <div class="row"><div class="avatar ${c.cls}">${c.initials}</div>
      <div style="flex:1"><div class="spread"><h3 style="font-size:15px;margin:0">${c.name}</h3>
        <div class="row" style="gap:6px"><span class="pill ${scoreCls(c.score)}">${c.score??6}/10</span>
          <span class="pill ${c.status==='Active'?'green':'gray'}">${c.status}</span></div></div></div></div>
    <div class="zonechips">${c.zones.length?c.zones.map(z=>`<span class="chip">${z}</span>`).join(''):'<span class="chip">No zone set</span>'}</div>
    <div class="availbar">${days.map(d=>`<span class="${wk[d]?'a':''}">${d[0]}</span>`).join('')}</div>
    <div class="muted" style="font-size:11.5px;margin-top:7px">${times}</div>
  </div>`;
}

function openAdminChat(id){ activeAdminChat=id;
  const ch=state.adminChats.find(c=>c.id===id); if(ch)ch.unread=false; render(); }
function openMsgPicker(){
  sheet(`
    <button class="closex" onclick="closeSheet()">×</button>
    <h3>Message a contractor</h3>
    <div class="notice">Start a conversation — they'll see it in their Chat tab.</div>
    ${(state.contractors||[]).length?state.contractors.map(c=>`
      <div class="checkrow" onclick="startChatWith('${c.id}')">
        <div class="avatar ${c.cls}" style="width:32px;height:32px;font-size:12px">${c.initials}</div>
        <strong>${c.name}</strong></div>`).join(''):`<div class="muted">No contractors yet.</div>`}
  `);
}
function startChatWith(id){ closeSheet(); activeAdminChat=id; render(); }
function adminChatView(){
  let ch=state.adminChats.find(c=>c.id===activeAdminChat);
  if(!ch){ const c=(state.contractors||[]).find(x=>x.id===activeAdminChat)
              || (state.team||[]).find(x=>x.id===activeAdminChat)
              || {name:'Contractor',initials:'?',cls:''};
    ch={id:activeAdminChat, contractor:c.name, initials:c.initials, cls:c.cls, last:'', unread:false, log:[]}; }
  return `
  <div class="row" style="margin-bottom:10px"><button class="btn ghost sm" onclick="closeAdminChat()">‹ Inbox</button>
    <div class="row"><div class="avatar ${ch.cls}">${ch.initials}</div><strong>${ch.contractor}</strong></div></div>
  <div class="chatwrap">
    <div class="chatlog" id="chatlog">${ch.log.map(m=>{
      const cls=m.from==='admin'?'me':(m.from==='bot'?'bot':'admin');
      const who=m.from==='bot'?'<div class="msgmeta">AI assistant</div>':(m.from==='me'?`<div class="msgmeta">${ch.contractor}</div>`:'');
      return `${who}<div class="msg ${cls}">${m.text}</div>`;}).join('')}</div>
    <div class="chatinput">
      <input id="adminField" placeholder="Reply to ${ch.contractor.split(' ')[0]}…" onkeydown="if(event.key==='Enter')adminSend()">
      <button class="iconbtn" onclick="adminSend()">${svg(ICON.send)}</button>
    </div>
  </div>`;
}
async function adminSend(){
  const f=document.getElementById('adminField'); const t=f.value.trim(); if(!t)return;
  f.value='';
  if(ONLINE){
    const { error } = await sb.from('messages').insert({contractor_id:activeAdminChat,sender:'admin',body:t});
    if(error){ toast('Send failed: '+error.message); return; }
    await sbRefresh(); scrollChat(); toast('Message sent to contractor');
  } else {
    let ch=state.adminChats.find(c=>c.id===activeAdminChat);
    if(!ch){ const c=(state.contractors||[]).find(x=>x.id===activeAdminChat)||{contractor:'Contractor',initials:'?',cls:''};
      ch={id:activeAdminChat,contractor:c.name||'Contractor',initials:c.initials||'?',cls:c.cls||'',last:'',unread:false,log:[]}; state.adminChats.push(ch); }
    ch.log.push({from:'admin',text:t,t:Date.now()}); ch.last='You: '+t; ch.unread=false;
    render(); scrollChat(); toast('Message sent to contractor');
  }
}
function closeAdminChat(){ activeAdminChat=null; render(); }

function openOfferJob(){
  sheet(`
    <button class="closex" onclick="closeSheet()">×</button>
    <h3>Offer an extra assignment</h3>
    <label>Job / client</label><input id="ojClient" placeholder="e.g. Hampton Inn — lobby">
    <label>Date & time</label><input id="ojDate" placeholder="e.g. Sat Jun 27, 8:00 AM">
    <label>Address</label><input id="ojAddr" placeholder="Street, neighbourhood">
    <label>Pay</label><input id="ojPay" value="$27/hr">
    <label>Why is it an extra assignment?</label>
    <div id="ojReasons" style="margin-top:8px">
      ${['Short notice','Holiday','Outside service zone'].map(r=>`
        <div class="checkrow" onclick="this.classList.toggle('sel')"><span class="cb">✓</span>${r}</div>`).join('')}
    </div>
    <div class="divider"></div>
    <label>Offer to which contractor(s)?</label>
    <div id="ojWho" style="margin-top:8px">
      ${state.contractors.map(c=>`
        <div class="checkrow" data-id="${c.id}" onclick="this.classList.toggle('sel')">
          <span class="cb">✓</span>
          <div class="avatar ${c.cls}" style="width:30px;height:30px;font-size:12px">${c.initials}</div>
          <div><strong>${c.name}</strong><div class="muted" style="font-size:11px">${c.zones.join(', ')}</div></div>
        </div>`).join('')}
    </div>
    <button class="btn primary" style="margin-top:16px" onclick="sendOffer()">Send offer</button>
  `);
}
function sendOffer(){
  const client=val('ojClient'),date=val('ojDate'),addr=val('ojAddr'),pay=val('ojPay');
  if(!client||!date||!pay){ toast('Add client, date and pay'); return; }
  const reasons=[...document.querySelectorAll('#ojReasons .checkrow.sel')].map(e=>e.textContent.trim());
  const who=[...document.querySelectorAll('#ojWho .checkrow.sel')].map(e=>e.dataset.id);
  if(!who.length){ toast('Pick at least one contractor'); return; }
  const rs = reasons.length?reasons:['Extra assignment'];
  who.forEach(id=>{
    state.premiumOffers.push({id:'p'+Date.now()+id,to:id,client,date,pay,reasons:rs,addr,status:'pending'});
    if(ONLINE) sbDo(sb.from('assignments').insert({contractor_id:id,client,job_date:date,address:addr,pay,reasons:rs,status:'pending'}));
  });
  closeSheet();
  toast(`Offer sent to ${who.length} contractor${who.length>1?'s':''} ✓`);
  if(ONLINE) sbRefresh(); else render();
}

/* ---------- sheet/modal plumbing ---------- */
function sheet(html){ document.getElementById('sheet').innerHTML=html; document.getElementById('modal').classList.add('on'); }
function closeSheet(){ document.getElementById('modal').classList.remove('on'); }
document.getElementById('modal').addEventListener('click',e=>{ if(e.target.id==='modal')closeSheet(); });

/* ---------- utils ---------- */
function val(id){ const e=document.getElementById(id); return e?e.value.trim():''; }

/* ---------- boot ---------- */
async function boot(){
  if(ONLINE){
    session=null;
    try{
      const { data:{ session:s } } = await sb.auth.getSession();
      if(s){ const ok=await sbLoadAll(); if(!ok) session=null; }
    }catch(e){ console.error(e); }
    render();
    if(session && session.needsName) openNameSetup();
    sb.auth.onAuthStateChange((_e,s2)=>{ if(!s2){ session=null; render(); } });
  } else {
    session=loadSession();
    render();
  }
}
boot();
</script>

if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('sw.js').catch(function(){});
  });
}
